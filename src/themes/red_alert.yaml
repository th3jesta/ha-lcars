lcars-card-button-color: var(--lcars-muted-coral)
lcars-card-bottom-color: var(--lcars-sienna)
lcars-settings-card-color: "#A5645A"

lcars-card-top-text: var(--lcars-text-light)
lcars-card-mid-text: var(--lcars-text-light)
